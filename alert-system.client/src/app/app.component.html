<div class="shell">
  <header class="hero">
    <div>
      <p class="eyebrow">PoC Admin Console</p>
      <h1>{{ title }}</h1>
      <p class="hero-copy">
        Separate user and admin pages for rule setup, ingestion, logs, and demo data.
      </p>
    </div>

    <nav class="hero-actions">
      <a class="secondary-button" routerLink="/user" routerLinkActive="active-nav" [routerLinkActiveOptions]="{ exact: true }">User page</a>
      <a class="secondary-button" routerLink="/admin" routerLinkActive="active-nav">Admin page</a>
    </nav>
  </header>

  <router-outlet></router-outlet>
</div>
